<!-- Feltöltő sáv -->
<div
  style="padding: 12px; background: #0a0f1c; border-bottom: 1px solid #111827">
  <app-trace-upload (loaded)="onTraceLoaded($event)"></app-trace-upload>
</div>

<!-- Timeline / csúszka -->
<div class="timeline-bar" *ngIf="filmDuration > 0">
  <div class="timeline-row">
    <span class="timeline-label">Time:</span>
    <span class="timeline-value"
      >Film: {{ clock | number: "1.0-0" }} ms /
      {{ filmDuration | number: "1.0-0" }} ms &nbsp;|&nbsp;  Real:
      {{ clockReal | number: "1.0-0" }} ms /
      {{ realDuration | number: "1.0-0" }} ms
    </span>
  </div>

  <div class="controls-row">
    <button class="btn" (click)="restart()" [disabled]="filmDuration <= 0">
      ⟲
    </button>
    <button
      class="btn"
      (click)="jumpPrevEvent()"
      [disabled]="filmDuration <= 0">
      ◀ Prev event
    </button>
    <button
      class="btn primary"
      (click)="togglePlay()"
      [disabled]="filmDuration <= 0">
      {{ playing ? "Pause" : "Play" }}
    </button>
    <button
      class="btn"
      (click)="jumpNextEvent()"
      [disabled]="filmDuration <= 0">
      Next event ▶
    </button>

    <span class="spacer"></span>

    <label class="speed">
      Speed:
      <input
        type="range"
        min="0"
        max="100"
        step="1"
        [value]="speedSlider"
        (input)="onSpeedInput($event)" />
      <span class="speed-value"> {{ speed / 1000 | number: "1.1-2" }}x </span>
    </label>

    <label class="chk">
      <input
        type="checkbox"
        [checked]="showArrived"
        (change)="onShowArrivedChange($event)" />
      Show arrived messages
    </label>
  </div>

  <div class="slider-wrap">
    <span
      class="event-marker"
      *ngFor="let m of eventMarkers"
      [style.left]="markerLeft(m.leftPct)"
      [style.transform]="'translate(-50%)'"></span>

    <input
      class="timeline-slider"
      type="range"
      [min]="0"
      [max]="filmDuration"
      [step]="1"
      [value]="clock"
      (input)="onClockInput($event)" />
  </div>
</div>

<!-- Statikus gráf nézet -->
<div class="graph-wrap">
  <app-graph-view
    [nodes]="allNodes"
    [links]="allLinks"
    [messages]="allMessages"
    [clockReal]="clockReal"
    [clockFilm]="clock"
    [realDuration]="realDuration"
    [filmDuration]="filmDuration"
    [showArrived]="showArrived"
    [msgTravelFilmMs]="msgTravelFilmMs">
  </app-graph-view>
</div>

<router-outlet />
