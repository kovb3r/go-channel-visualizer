<div class="uploader">
    <div class="row">
        <button class="btn" (click)="onPickFileClick(fileInput)">
            upload JSON file
        </button>
        <input
            #fileInput
            type="file"
            accept="application/json,.json"
            (change)="onFileChange($event)"
            hidden />
    </div>

    <div class="meta" *ngIf="fileName && !error">
        <div><strong>File:</strong> {{ fileName }}</div>
        <div><strong>Size:</strong> {{ fileSize ?? 0 | number }} B</div>
        <div *ngIf="summary">
            <strong>Content:</strong>
            {{ summary.channels }} channel, {{ summary.events }} event
        </div>
    </div>

    <div class="err" *ngIf="error">{{ error }}</div>
</div>
