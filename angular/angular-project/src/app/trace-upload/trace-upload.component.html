<div class="uploader">
    <div class="row">
        <button class="btn" (click)="onPickFileClick(fileInput)">
            JSON feltöltése
        </button>
        <input
            #fileInput
            type="file"
            accept="application/json,.json"
            (change)="onFileChange($event)"
            hidden />
    </div>

    <div class="meta" *ngIf="fileName && !error">
        <div><strong>Fájl:</strong> {{ fileName }}</div>
        <div><strong>Méret:</strong> {{ fileSize ?? 0 | number }} B</div>
        <div *ngIf="summary">
            <strong>Tartalom:</strong>
            {{ summary.channels }} csatorna, {{ summary.events }} esemény
        </div>
    </div>

    <div class="err" *ngIf="error">{{ error }}</div>
</div>
